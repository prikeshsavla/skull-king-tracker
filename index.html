<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull King Score Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
        

    <style type="text/tailwindcss">
        @layer utilities {
            .hidden {
                display: none !important;
            }
            .sticky-footer {
                position: sticky;
                bottom: 0;
                background-color: #e9ecef;
                z-index: 10;
            }
            .safe-bottom {
                padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
            }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 p-3 sm:p-6">
    <div class="mx-auto max-w-5xl rounded-[2rem] bg-white p-4 shadow-xl ring-1 ring-slate-200 sm:p-6">
        <h1 class="mb-6 text-center text-3xl font-black tracking-tight text-blue-700 sm:text-5xl">Skull King Score Tracker</h1>

        <div id="player-setup" class="mb-6 rounded-2xl border border-slate-200 bg-slate-50 p-4 shadow-sm">
            <h2 class="mb-4 text-xl font-bold text-blue-700">Player Setup</h2>

            <div id="cached-names" class="mb-4 rounded-2xl bg-white p-3 ring-1 ring-slate-200">
                <p class="mb-2 font-semibold text-slate-800">Select cached players:</p>
                <div id="cached-names-buttons" class="flex flex-wrap gap-2">
                    </div>
                 <p id="no-cached-names" class="hidden text-sm italic text-slate-600">No cached names found.</p>
            </div>

            <div id="selected-players" class="mb-4 rounded-2xl border-2 border-dashed border-slate-300 bg-white p-3">
                 <p class="mb-2 font-semibold text-slate-800">Players in New Game:</p>
                 <ul id="player-list" class="flex flex-wrap gap-x-4 gap-y-2 list-none p-0 m-0">
                      <li class="italic text-slate-600">No players added yet.</li>
                 </ul>
            </div>


            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="new-player-name" placeholder="Enter player name" class="min-h-12 flex-grow rounded-xl border border-slate-300 p-3 text-base shadow-sm focus:outline-none focus:ring-4 focus:ring-blue-200">
                <button id="add-player-btn" class="min-h-12 rounded-xl bg-blue-700 px-4 py-3 text-base font-semibold text-white shadow-sm hover:bg-blue-800 focus:outline-none focus:ring-4 focus:ring-blue-200">Add Player</button>
            </div>
             <div class="flex flex-col sm:flex-row gap-2 mt-4">
                <button id="start-game-btn" class="min-h-12 w-full rounded-xl bg-emerald-700 p-3 text-base font-semibold text-white shadow-sm hover:bg-emerald-800 focus:outline-none focus:ring-4 focus:ring-emerald-200 disabled:cursor-not-allowed disabled:opacity-50" disabled>Start Game</button>
             </div>
        </div>

        <div id="game-area" class="hidden">
             <button id="new-game-btn" class="mb-4 min-h-12 w-full rounded-xl bg-rose-600 p-3 text-base font-semibold text-white shadow-sm hover:bg-rose-700 focus:outline-none focus:ring-4 focus:ring-rose-200">New Game</button>

            <div class="mb-4 rounded-2xl bg-gradient-to-r from-blue-50 to-cyan-50 p-4 ring-1 ring-blue-100">
                <h2 id="current-round-title" class="text-center text-2xl font-black text-blue-700 sm:text-4xl">Round 1</h2>
                <p id="round-progress-summary" class="mt-2 text-center text-sm font-medium text-slate-700" aria-live="polite">Enter bids, tricks won, and bonuses for this round.</p>
                <p id="round-validation-message" class="mt-2 hidden rounded-xl border border-amber-300 bg-amber-50 px-3 py-2 text-sm font-medium text-amber-900" role="alert" aria-live="assertive"></p>
            </div>

             <div id="current-round-inputs" class="mb-28 grid gap-4 sm:mb-8 sm:grid-cols-2 xl:grid-cols-3">
                  </div>

            <div class="fixed inset-x-0 bottom-0 z-20 border-t border-slate-200 bg-white/95 px-3 py-3 backdrop-blur safe-bottom sm:static sm:border-0 sm:bg-transparent sm:px-0 sm:py-0">
                <div class="mx-auto flex max-w-5xl gap-3">
                    <button id="calculate-round-btn" class="hidden min-h-12 flex-1 rounded-2xl bg-emerald-700 p-3 text-base font-semibold text-white shadow-lg hover:bg-emerald-800 focus:outline-none focus:ring-4 focus:ring-emerald-200">Calculate Round Score</button>
                    <button id="next-round-btn" class="hidden min-h-12 flex-1 rounded-2xl bg-blue-700 p-3 text-base font-semibold text-white shadow-lg hover:bg-blue-800 focus:outline-none focus:ring-4 focus:ring-blue-200">Next Round</button>
                </div>
            </div>


            <div class="score-table-container overflow-x-auto mb-6">
                <table id="score-table" class="w-full min-w-[32rem] border-collapse overflow-hidden rounded-2xl border border-slate-200">
                    <thead>
                        <tr>
                            <th class="border border-slate-200 bg-blue-700 p-2 text-center text-white">Round</th>
                            </tr>
                         </thead>
                    <tbody id="score-table-body">
                        </tbody>
                    <tfoot id="score-table-foot">
                         <tr id="round-score-row" class="bg-slate-100 font-semibold">
                            <td class="border border-slate-200 p-2 text-center">Round Score</td>
                            </tr>
                        <tr id="total-score-row" class="bg-slate-200 font-bold sticky-footer">
                            <td class="border border-slate-200 p-2 text-center">Total</td>
                            </tr>
                    </tfoot>
                </table>
            </div>
             </div>

        <div id="game-history" class="mt-8 border-t border-slate-200 pt-6">
            <h2 class="mb-4 text-center text-xl font-bold text-blue-700">Game History</h2>
            <div class="overflow-x-auto">
                <table id="history-table" class="w-full min-w-[24rem] border-collapse overflow-hidden rounded-2xl border border-slate-200">
                    <thead>
                        <tr>
                            <th class="border border-slate-200 bg-slate-700 p-2 text-center text-white">Date/Time</th>
                            </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <tr>
                              <td colspan="100%" class="border border-slate-200 p-2 text-center italic text-slate-600">No games played yet.</td>
                         </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
